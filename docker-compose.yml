version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Ollama runs on the HOST — containers reach it via host.docker.internal.
  # This service block only pulls/warms up the models and exits; it is not
  # the Ollama server itself. Start Ollama on the host before running compose.
  ollama-init:
    image: curlimages/curl:latest
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama on host…' &&
        until curl -sf http://host.docker.internal:11434/api/tags; do sleep 2; done &&
        echo 'Ollama reachable. Pulling models…' &&
        curl -s -X POST http://host.docker.internal:11434/api/pull -d '{\"name\":\"qwen2.5-coder:7b\"}' &&
        curl -s -X POST http://host.docker.internal:11434/api/pull -d '{\"name\":\"qwen2.5-coder:1.5b\"}' &&
        echo 'Models ready.'
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Application services (added per-phase) ─────────────────────────────────

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      RUNNER_IMAGE: ${RUNNER_IMAGE:-codesync-runner}
      RUNNER_TIMEOUT_SECONDS: ${RUNNER_TIMEOUT_SECONDS:-10}
      RUNNER_MEMORY: ${RUNNER_MEMORY:-256m}
      RUNNER_CPUS: ${RUNNER_CPUS:-0.5}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      AI_MODEL_HEAVY: ${AI_MODEL_HEAVY:-qwen2.5-coder:7b}
      AI_MODEL_LIGHT: ${AI_MODEL_LIGHT:-qwen2.5-coder:1.5b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    profiles: ["app"]

  collab-server:
    build:
      context: ./collab-server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 1234
    ports:
      - "1234:1234"
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["app"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:1234
      VITE_AI_URL: http://localhost:8001
    ports:
      - "5173:5173"
    depends_on:
      - api
      - collab-server
      - ai-service
    profiles: ["app"]

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-change_me}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["app"]

volumes:
  postgres_data:
  redis_data:
