spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/codesync}
    username: ${SPRING_DATASOURCE_USERNAME:codesync}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      url: ${SPRING_REDIS_URL:redis://localhost:6379}

jwt:
  secret: ${JWT_SECRET:dev_secret_change_in_production_32_chars_min}
  expiration-ms: 86400000   # 24 hours

runner:
  image: ${RUNNER_IMAGE:codesync-runner}
  timeout-seconds: ${RUNNER_TIMEOUT_SECONDS:10}
  memory: ${RUNNER_MEMORY:256m}
  cpus: ${RUNNER_CPUS:0.5}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.codesync: DEBUG
    org.springframework.security: INFO
